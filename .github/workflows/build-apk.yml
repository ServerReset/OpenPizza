name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'android/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=8.11.1

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openpizza-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign release APK
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          if [ -n "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > keystore.jks
            jarsigner -verbose \
              -sigalg SHA256withRSA \
              -digestalg SHA-256 \
              -keystore keystore.jks \
              -storepass "$SIGNING_STORE_PASSWORD" \
              -keypass "$SIGNING_KEY_PASSWORD" \
              app/build/outputs/apk/release/*.apk \
              "$SIGNING_KEY_ALIAS"
            rm -f keystore.jks
          fi

      - name: Upload release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openpizza-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release (on tag or main push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: "OpenPizza ${{ github.sha }}"
          tag_name: "build-${{ github.run_number }}"
          body: |
            ## OpenPizza Android App

            Automated build #${{ github.run_number }}

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            ### Download
            - [Debug APK](./openpizza-debug-apk) (unsigned, for testing)
            - [Release APK](./openpizza-release-apk) (signed if keystore configured)

            ### How to install
            1. Download the APK from the artifacts section above
            2. Enable "Install from unknown sources" on your device
            3. Open the APK file to install

            > Note: You need the Express backend server running at the same time.
            > The Android app connects to `http://10.0.2.2:3000` (emulator) or your machine's IP.
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: false
          generate_release_notes: false
          prerelease: true

      - name: Summarize build
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Debug APK | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| Release APK | ✅ Built |" >> $GITHUB_STEP_SUMMARY
