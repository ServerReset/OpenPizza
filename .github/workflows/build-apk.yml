name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'android/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=8.11.1

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openpizza-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Generate keystore for release signing
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.SIGNING_KEY_PASSWORD }}
          STORE_PASS: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
            echo "KEYSTORE=${{ github.workspace }}/android/keystore.jks" >> $GITHUB_ENV
            echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
            echo "STORE_PASS=$STORE_PASS" >> $GITHUB_ENV
            echo "KEY_PASS=$KEY_PASS" >> $GITHUB_ENV
          else
            KS_PASS="openpizza$(date +%s)"
            KEY_P="openpizza$(date +%s)"
            keytool -genkey -v -keystore keystore.jks -alias openpizza \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KS_PASS" -keypass "$KEY_P" \
              -dname "CN=OpenPizza, OU=Dev, O=OpenPizza, L=Unknown, ST=Unknown, C=US"
            echo "KEYSTORE=${{ github.workspace }}/android/keystore.jks" >> $GITHUB_ENV
            echo "KEY_ALIAS=openpizza" >> $GITHUB_ENV
            echo "STORE_PASS=$KS_PASS" >> $GITHUB_ENV
            echo "KEY_PASS=$KEY_P" >> $GITHUB_ENV
          fi
          echo "Keystore generated at: $KEYSTORE"
          ls -lh keystore.jks

      - name: Build and sign release APK (via Gradle)
        run: ./gradlew assembleRelease

      - name: Verify APK signature
        run: |
          ANDROID_SDK=${ANDROID_SDK_ROOT:-$ANDROID_HOME}
          APKSIGNER=$(ls $ANDROID_SDK/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          APK="app/build/outputs/apk/release/app-release.apk"
          echo "Verifying: $APK"
          "$APKSIGNER" verify --verbose "$APK"
          ls -lh "$APK"

      - name: Rename release APK for clarity
        run: |
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/OpenPizza-release.apk

      - name: Upload release APK as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openpizza-release-apk
          path: android/app/build/outputs/apk/release/OpenPizza-release.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Rename debug APK
        if: always()
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/OpenPizza-debug.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: "OpenPizza ${{ github.sha }}"
          tag_name: "build-${{ github.run_number }}"
          body: |
            ## OpenPizza Android App

            Automated build #${{ github.run_number }}

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            ### Download & Install
            Download `OpenPizza-release.apk` — signed and ready to install.

            ### How to install
            1. Download `OpenPizza-release.apk` from the release assets below
            2. On your phone, open the downloaded file
            3. Tap "Install anyway" if Play Protect warns you
            4. Enjoy!

            > ⚠️ The app needs the Express backend server running.
            > The Android app connects to `http://10.0.2.2:3000` (emulator) or your machine's LAN IP.
          files: |
            android/app/build/outputs/apk/release/OpenPizza-release.apk
            android/app/build/outputs/apk/debug/OpenPizza-debug.apk
          fail_on_unmatched_files: false
          generate_release_notes: false
          prerelease: true

      - name: Clean up keystore
        if: always()
        run: rm -f keystore.jks

      - name: Summarize build
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Size | Signed? |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Release APK | $(du -h app/build/outputs/apk/release/OpenPizza-release.apk | cut -f1) | ✅ Yes (by Gradle) |" >> $GITHUB_STEP_SUMMARY
          echo "| Debug APK | $(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1) | ✅ Yes (debug key) |" >> $GITHUB_STEP_SUMMARY
